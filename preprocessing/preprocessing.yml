name: Automated Preprocessing

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  preprocess:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.7'

      - name: Install dependencies
        run: pip install pandas scikit-learn

      - name: Run preprocessing script
        run: |
          cd preprocessing
          python automate_Latihan.py

      - name: Commit hasil preprocessing
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add preprocessing/namadataset_preprocessing.csv
          git commit -m "Automated preprocessing update" || echo "Tidak ada perubahan"
          git push